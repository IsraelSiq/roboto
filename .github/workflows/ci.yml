name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY || 'ci_dummy_key' }}
          BINANCE_SECRET: ${{ secrets.BINANCE_SECRET || 'ci_dummy_secret' }}
          BINANCE_TESTNET: 'true'
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY || 'ci_dummy_newsapi' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'ci_dummy_supabase' }}
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_api.py \
            --ignore=tests/integration

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8
      - run: flake8 backend/ --max-line-length=120 --ignore=E501,W503,E221,E241,E226,E231,E402,E701,W291,W293
