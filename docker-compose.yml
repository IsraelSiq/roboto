version: '3.9'

services:
  backend:
    build: .
    container_name: roboto-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Opcional: rodar o frontend junto
